
{% extends 'base.html' %}
{% block content %}


<div class="container-fluid mt-3">
 <div class="row">

    <div class="col-lg-3">
      <div class="list-group">

         <a href="/" class="list-group-item list-group-item-action">All Product</a>

        {% for category in category %}
        <a href="/?category={{category.id}}" class="list-group-item list-group-item-action">{{category.name}}</a>
        {% endfor %}
      </div>
    </div>



  <!---Product-->

  <div id="product" class="col-lg-9">

    <div class="row mx-auto">
     {% for product in product %}
    

    <div class="col-6 col-md-4 col-lg-3">
   <a href="{% url 'product-detail' product.id %}" class="btn"><div class="item"><img src="{{product.image.url}}" class="card-img-top" alt="..."></div></a>
  <div class="card-body">
    <h6 class="card-title">{{product.name}}</h6>
    <h4 class="card-text">Tk. {{product.price}}</h4>
  </div>
</div>

    {% endfor %}
</div>
  </div>
 </div>
</div>


{% endblock %}
